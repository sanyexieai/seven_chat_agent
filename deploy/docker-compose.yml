# 生产部署 compose（镜像由 CI 构建并推送到 3ye.co:9443）
# 用法见 docs/deploy-docker.md
#
# 1. cp .env.example .env 并填写 API Key / HTTPS（可选）
# 2. docker compose up -d server
#
# HTTPS：在 .env 设置 HONEYCOMB_HTTPS_BIND 与证书路径，并取消注释下方证书 volume。

services:
  server:
    image: ${SERVER_IMAGE:-3ye.co:9443/seven-chat-agent/server:latest}
    container_name: seven-chat-agent-server
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${SERVER_PORT:-18737}:18737"
      - "${SERVER_HTTPS_PORT:-18743}:18743"
    volumes:
      - server-data:/app/data
      # 启用 HTTPS 时取消注释（TLS_CERTS_DIR 见 deploy/.env.example）
      # - ${TLS_CERTS_DIR:-/etc/letsencrypt}:/app/certs:ro
    environment:
      # ── 服务（容器内路径；可被 deploy/.env 覆盖）──
      HONEYCOMB_BIND: ${HONEYCOMB_BIND:-0.0.0.0:18737}
      HONEYCOMB_DATA: ${HONEYCOMB_DATA:-/app/data}
      HONEYCOMB_DB: ${HONEYCOMB_DB:-sqlite:///app/data/seven_chat_agent.db}
      SEVEN_CHAT_AGENT_STATIC_DIR: ${SEVEN_CHAT_AGENT_STATIC_DIR:-/app/web/dist}
      SEVEN_CHAT_AGENT_VAULT: ${SEVEN_CHAT_AGENT_VAULT:-/app/data/vault.json}
      SEVEN_CHAT_AGENT_SKILLS_DIR: ${SEVEN_CHAT_AGENT_SKILLS_DIR:-/app/data/skills}
      SEVEN_CHAT_AGENT_CLI_WORKSPACE_ROOT: ${SEVEN_CHAT_AGENT_CLI_WORKSPACE_ROOT:-/app/data/cli-workspaces}
      # ── 助理默认模型 ──
      SEVEN_CHAT_AGENT_ASSISTANT_PROVIDER: ${SEVEN_CHAT_AGENT_ASSISTANT_PROVIDER:-deepseek}
      SEVEN_CHAT_AGENT_ASSISTANT_MODEL: ${SEVEN_CHAT_AGENT_ASSISTANT_MODEL:-deepseek-v4-flash}
      # ── HTTPS（默认关闭；在 .env 填写后启用）──
      HONEYCOMB_HTTPS_BIND: ${HONEYCOMB_HTTPS_BIND:-}
      HONEYCOMB_TLS_CERT: ${HONEYCOMB_TLS_CERT:-}
      HONEYCOMB_TLS_KEY: ${HONEYCOMB_TLS_KEY:-}
      HONEYCOMB_PUBLIC_HTTPS_PORT: ${HONEYCOMB_PUBLIC_HTTPS_PORT:-}
      # API Key、OLLAMA、AUTH 等其余变量由 env_file (.env) 注入，无需在此逐条列出

  cli-relay:
    profiles: ["relay"]
    image: ${CLI_RELAY_IMAGE:-3ye.co:9443/seven-chat-agent/cli-relay:latest}
    container_name: seven-chat-agent-cli-relay
    restart: unless-stopped
    depends_on:
      - server
    env_file:
      - .env
    environment:
      SEVEN_CHAT_AGENT_RELAY_URL: ${RELAY_URL:-ws://server:18737/cli-relay}
      SEVEN_CHAT_AGENT_RELAY_PAIRING_TOKEN: ${RELAY_PAIRING_TOKEN:?set RELAY_PAIRING_TOKEN in .env}
      SEVEN_CHAT_AGENT_RELAY_NAME: ${RELAY_NAME:-docker-relay}
      SEVEN_CHAT_AGENT_RELAY_WORKSPACE_ROOT: /data/cli-workspaces
    volumes:
      - relay-data:/data

volumes:
  server-data:
  relay-data:
