# 打 Git 标签后：构建 Docker 镜像 → 推送到 3ye.co:9443 → SSH 到服务器拉取并运行
#
# 标签约定:
#   v2.0.0          — 构建 server + cli-relay，部署 all
#   cli-relay/2.0.0 — 仅构建/部署 cli-relay
#   v2.0.0-server   — 仅构建/部署 server
#
# GitHub Secrets:
#   REGISTRY_USERNAME, REGISTRY_PASSWORD  — 3ye.co:9443 仓库账号
#   SSH_HOST, SSH_USER, SSH_PRIVATE_KEY   — 部署目标机
#   SSH_PORT (可选，默认 22)
#   DEPLOY_PATH (可选，默认 /opt/seven-chat-agent/deploy)

name: CLI Release (Docker)

on:
  push:
    tags:
      - "v*"
      - "cli-relay/*"

env:
  REGISTRY: 3ye.co:9443
  IMAGE_NAMESPACE: seven-chat-agent

jobs:
  parse:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      build_server: ${{ steps.meta.outputs.build_server }}
      build_relay: ${{ steps.meta.outputs.build_relay }}
      deploy_target: ${{ steps.meta.outputs.deploy_target }}
    steps:
      - id: meta
        run: |
          ref="${GITHUB_REF_NAME}"
          version="$ref"
          build_server=true
          build_relay=true
          deploy_target=all

          if [[ "$ref" == cli-relay/* ]]; then
            version="${ref#cli-relay/}"
            build_server=false
            deploy_target=cli-relay
          elif [[ "$ref" == v*-server ]]; then
            version="${ref%-server}"
            version="${version#v}"
            build_relay=false
            deploy_target=server
          elif [[ "$ref" == v* ]]; then
            version="${ref#v}"
          fi

          version="${version#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "build_server=$build_server" >> "$GITHUB_OUTPUT"
          echo "build_relay=$build_relay" >> "$GITHUB_OUTPUT"
          echo "deploy_target=$deploy_target" >> "$GITHUB_OUTPUT"

  build-server:
    needs: parse
    if: needs.parse.outputs.build_server == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/server:${{ needs.parse.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-cli-relay:
    needs: parse
    if: needs.parse.outputs.build_relay == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/cli-relay/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/cli-relay:${{ needs.parse.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/cli-relay:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-cli-relay-binaries:
    needs: parse
    if: needs.parse.outputs.build_relay == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-amd64
            ext: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-amd64
            ext: ".exe"
          - os: macos-13
            target: x86_64-apple-darwin
            suffix: macos-amd64
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
            ext: ""
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build cli-relay binary
        shell: bash
        run: cargo build --release -p seven-chat-agent-cli-relay --target "${{ matrix.target }}"

      - name: Package binary (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          BIN="target/${{ matrix.target }}/release/seven-chat-agent-cli-relay"
          OUT="seven-chat-agent-cli-relay-${{ needs.parse.outputs.version }}-${{ matrix.suffix }}.tar.gz"
          tar -C "$(dirname "$BIN")" -czf "dist/$OUT" "$(basename "$BIN")"
          shasum -a 256 "dist/$OUT" > "dist/$OUT.sha256"

      - name: Package binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $bin = "target/${{ matrix.target }}/release/seven-chat-agent-cli-relay.exe"
          $out = "seven-chat-agent-cli-relay-${{ needs.parse.outputs.version }}-${{ matrix.suffix }}.zip"
          Compress-Archive -Path $bin -DestinationPath "dist/$out" -Force
          $hash = (Get-FileHash "dist/$out" -Algorithm SHA256).Hash.ToLower()
          "$hash  $out" | Out-File -FilePath "dist/$out.sha256" -Encoding ascii

      - uses: actions/upload-artifact@v4
        with:
          name: cli-relay-bin-${{ matrix.suffix }}
          path: dist/*

  publish-cli-relay-binaries:
    needs: [parse, build-cli-relay-binaries]
    if: needs.parse.outputs.build_relay == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: cli-relay-bin-*
          merge-multiple: true

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*

  deploy:
    needs: [parse, build-server, build-cli-relay, build-cli-relay-binaries, publish-cli-relay-binaries]
    runs-on: ubuntu-latest
    if: |
      always() &&
      !cancelled() &&
      (needs.build-server.result == 'success' || needs.build-server.result == 'skipped') &&
      (needs.build-cli-relay.result == 'success' || needs.build-cli-relay.result == 'skipped') &&
      (needs.build-cli-relay-binaries.result == 'success' || needs.build-cli-relay-binaries.result == 'skipped') &&
      (needs.publish-cli-relay-binaries.result == 'success' || needs.publish-cli-relay-binaries.result == 'skipped') &&
      (needs.build-server.result == 'success' || needs.build-cli-relay.result == 'success')
    steps:
      - uses: actions/checkout@v4

      - name: Sync deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "deploy/docker-compose.yml,deploy/remote-up.sh,deploy/.env.example"
          target: ${{ secrets.DEPLOY_PATH || '/opt/seven-chat-agent/deploy' }}
          strip_components: 1

      - name: Pull images and restart
        uses: appleboy/ssh-action@v1.2.0
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: REGISTRY_USERNAME,REGISTRY_PASSWORD
          script: |
            set -euo pipefail
            DEPLOY="${{ secrets.DEPLOY_PATH || '/opt/seven-chat-agent/deploy' }}"
            chmod +x "$DEPLOY/remote-up.sh"
            export REGISTRY="${{ env.REGISTRY }}"
            export IMAGE_TAG="${{ github.ref_name }}"
            export REGISTRY_USERNAME
            export REGISTRY_PASSWORD
            bash "$DEPLOY/remote-up.sh" "${{ needs.parse.outputs.deploy_target }}"
